<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>评分报告</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --card:#f9fafb;
      --accent:#111827;
      --danger:#b91c1c;
      --ok:#047857;
    }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }
    h1{
      margin: 0 0 8px;
      font-size: 36px;
      letter-spacing: .5px;
    }
    .sub{
      color:var(--muted);
      margin: 0 0 22px;
      line-height: 1.6;
    }
    .row{
      display:flex;
      gap:12px;
      flex-wrap: wrap;
      align-items:center;
    }
    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding: 8px 10px;
      border:1px solid var(--border);
      border-radius: 999px;
      background:#fff;
      color:var(--muted);
      font-size: 13px;
    }
    .pill b{ color:var(--text); }
    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
    }
    .btn.primary{
      background: var(--accent);
      color:#fff;
      border-color: var(--accent);
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 18px;
    }
    @media (min-width: 860px){
      .grid.two{ grid-template-columns: 1fr 1fr; }
    }
    .card{
      background: var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
    }
    .card h2{
      margin:0 0 10px;
      font-size:16px;
      color:var(--text);
    }
    .kv{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      margin-top: 10px;
      color:var(--muted);
      font-size:14px;
    }
    .bigScore{
      font-size: 44px;
      font-weight: 800;
      line-height: 1.1;
      margin: 2px 0 6px;
    }
    .muted{ color:var(--muted); }
    .danger{ color: var(--danger); }
    .ok{ color: var(--ok); }
    .bar{
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow:hidden;
      margin-top: 10px;
    }
    .bar > div{
      height: 100%;
      background: #111827;
      width: 0%;
    }
    .sectionItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      margin-top:10px;
    }
    .sectionLeft{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .sectionTitle{
      font-weight:700;
      font-size:14px;
    }
    .sectionMeta{
      font-size:12px;
      color:var(--muted);
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }
    details{
      margin-top: 14px;
    }
    details > summary{
      cursor:pointer;
      color:var(--muted);
      user-select:none;
    }
    pre{
      white-space: pre-wrap;
      word-break: break-word;
      background:#0b1020;
      color:#e5e7eb;
      padding:12px;
      border-radius:12px;
      border:1px solid #111827;
      margin-top:10px;
      font-size: 12px;
    }
    .hr{
      height:1px;
      background:var(--border);
      margin:16px 0;
    }

    /* 新增模块 */
    .inserted-block{
      grid-column: 1 / -1;
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }
    .inserted-block .card{
      margin:0;
    }
    .card h3{
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--text);
    }
    .simple-text{
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
    }
    .miniBox{
      margin-top: 16px;
      padding: 14px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
    }
    .ctaRow{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .hide-card{
      display:none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>评分报告</h1>
    <p class="sub">基于你提交的答案生成（本页从 <span class="mono">/api/report</span> 拉取数据）。</p>

    <div class="row" id="topRow">
      <span class="pill">AttemptId: <b class="mono" id="attemptIdPill">—</b></span>
      <button class="btn" id="copyAttemptBtn">复制 AttemptId</button>
      <button class="btn" id="copyLinkBtn">复制报告链接</button>
      <button class="btn" id="refreshBtn">刷新</button>
    </div>

    <div id="app" class="grid"></div>
  </div>

  <script src="./score.js?v=20251223_1"></script>
  <script>
    (function () {
      function hideOldPlaceholderCards(app) {
        const cards = app.querySelectorAll(".card");
        const keywords = [
          "诊断总览（预览）",
          "Listening Skills Profile（12维能力画像）",
          "Listening Skills Profile",
          "Evidence Snapshot（证据快照）",
          "你的关键短板结论",
          "14 天可执行训练计划",
          "14天可执行训练计划",
          "解锁完整诊断（Premium）",
          "解锁完整版诊断（Premium）",
          "解锁完整诊断（内测报名）",
          "解锁完整版诊断（Premium）"
        ];

        Array.from(cards).forEach(card => {
          const text = (card.textContent || "").trim();
          if (keywords.some(keyword => text.includes(keyword))) {
            card.classList.add("hide-card");
          }
        });
      }

      function buildInsertedBlock() {
        const wrapper = document.createElement("div");
        wrapper.className = "inserted-block";
        wrapper.id = "insertedBlock";

        wrapper.innerHTML = `
          <section class="card">
            <h2>当前失分画像（免费版）</h2>
            <p id="freeDiagnosticSummary" class="simple-text">
              这里将显示你的免费版初步诊断。
            </p>

            <div class="miniBox">
              <h3>优先修复顺序</h3>
              <p id="priorityFixOrder" class="simple-text">
                这里将显示你的优先修复顺序。
              </p>
            </div>

            <div class="miniBox">
              <h3>今天就能开始的 1 个动作</h3>
              <p id="todayAction" class="simple-text">
                这里将显示今天就能开始的训练动作。
              </p>
            </div>
          </section>

          <section class="card">
            <h2>完整诊断（Premium 预览）</h2>
            <p class="simple-text">
              解锁后可查看你的完整能力画像、关键短板、错因证据和训练计划。
            </p>

            <details>
              <summary>12维能力画像（强弱分布 + Top3短板）</summary>
              <div class="simple-text" style="margin-top:8px;">
                解锁后查看你的 12 维能力分布，以及最影响提分的 Top3 短板。
              </div>
            </details>

            <details>
              <summary>高频错因标签</summary>
              <div class="simple-text" style="margin-top:8px;">
                解锁后查看你最常见的失分模式，例如同义替换、数字拼写、干扰项误判等。
              </div>
            </details>

            <details>
              <summary>Evidence Snapshot（证据快照）</summary>
              <div class="simple-text" style="margin-top:8px;">
                解锁后查看“你的答案 vs 标准答案 vs 判分规则”的具体证据。
              </div>
            </details>

            <details>
              <summary>7天 / 14天训练计划</summary>
              <div class="simple-text" style="margin-top:8px;">
                解锁后获取按你的薄弱点定制的训练动作。
              </div>
            </details>

            <div class="ctaRow">
              <button type="button" class="btn primary">解锁完整真诊断（内测版）</button>
              <button type="button" class="btn">添加微信领取完整分析</button>
            </div>
          </section>
        `;

        return wrapper;
      }

      function insertBlockBeforeAppendix(app) {
        if (!app) return false;

        hideOldPlaceholderCards(app);

        const oldInserted = document.getElementById("insertedBlock");
        if (oldInserted) oldInserted.remove();

        const appendixCard = Array.from(app.querySelectorAll(".card")).find(card => {
          const text = (card.textContent || "").trim();
          return !card.classList.contains("hide-card") && (text.includes("附录") || text.includes("Appendix"));
        });

        const insertedBlock = buildInsertedBlock();

        if (appendixCard) {
          app.insertBefore(insertedBlock, appendixCard);
          return true;
        }

        return false;
      }

      function fallbackInsert(app) {
        if (!app) return;
        hideOldPlaceholderCards(app);

        const oldInserted = document.getElementById("insertedBlock");
        if (oldInserted) oldInserted.remove();

        const insertedBlock = buildInsertedBlock();

        const inviteCard = Array.from(app.querySelectorAll(".card")).find(card => {
          const text = (card.textContent || "").trim();
          return !card.classList.contains("hide-card") && text.includes("邀请其他同学一起免费测试");
        });

        if (inviteCard && inviteCard.nextSibling) {
          app.insertBefore(insertedBlock, inviteCard.nextSibling);
        } else if (inviteCard) {
          app.appendChild(insertedBlock);
        } else {
          app.appendChild(insertedBlock);
        }
      }

      function boot() {
        const app = document.getElementById("app");
        if (!app) return;

        let done = false;

        const tryInsert = () => {
          const success = insertBlockBeforeAppendix(app);
          if (success) {
            done = true;
            return true;
          }
          return false;
        };

        if (tryInsert()) return;

        const observer = new MutationObserver(() => {
          if (done) return;
          if (tryInsert()) {
            observer.disconnect();
          }
        });

        observer.observe(app, { childList: true, subtree: true });

        setTimeout(() => {
          if (!done) {
            fallbackInsert(app);
            observer.disconnect();
          }
        }, 5000);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
